spring:
  application:
    name: music-worker
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:yanyun_music}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  flyway:
    enabled: true

server:
  port: ${MUSIC_WORKER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

yanyun:
  music:
    provider: ${MUSIC_PROVIDER:mock}
  render-worker:
    mode: ${RENDER_WORKER_MODE:mock}
    working-directory: ${RENDER_WORKER_WORKING_DIRECTORY:apps/render-worker}
    command: ${RENDER_WORKER_COMMAND:npm}
    arguments: ${RENDER_WORKER_ARGUMENTS:run,render:job,--}
    timeout: ${RENDER_WORKER_TIMEOUT:10m}
    composition-id: ${RENDER_WORKER_COMPOSITION_ID:LyricVideo16x9}
    video-object-key-prefix: ${RENDER_WORKER_VIDEO_OBJECT_KEY_PREFIX:videos}
    timeline-object-key-prefix: ${RENDER_WORKER_TIMELINE_OBJECT_KEY_PREFIX:timelines}
  storage:
    provider: ${OBJECT_STORAGE_PROVIDER:local}
    environment: ${YANYUN_ENV:local}
    local-root-directory: ${OBJECT_STORAGE_LOCAL_ROOT:build/local-object-storage/${S3_BUCKET_YANYUN_WORKS:yanyun-works-local}}
    public-base-url: ${OBJECT_STORAGE_PUBLIC_BASE_URL:http://localhost:9000/${S3_BUCKET_YANYUN_WORKS:yanyun-works-local}}
    endpoint: ${S3_ENDPOINT:${MINIO_ENDPOINT:http://localhost:9000}}
    public-endpoint: ${S3_PUBLIC_ENDPOINT:${MINIO_ENDPOINT:http://localhost:9000}}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET_YANYUN_WORKS:yanyun-works-local}
    access-key: ${S3_ACCESS_KEY:${MINIO_ROOT_USER:minioadmin}}
    secret-key: ${S3_SECRET_KEY:${MINIO_ROOT_PASSWORD:minioadmin}}
    path-style-enabled: ${S3_PATH_STYLE_ENABLED:true}
    auto-create-bucket: ${S3_AUTO_CREATE_BUCKET:true}
    url-ttl: ${OBJECT_STORAGE_URL_TTL:24h}
  dreammaker:
    base-url: ${DREAMMAKER_API_BASE_URL:https://api-all.dreammaker.netease.com}
    access-key: ${DREAMMAKER_ACCESS_KEY:}
    secret-key: ${DREAMMAKER_SECRET_KEY:}
    user-access-token: ${DREAMMAKER_USER_ACCESS_TOKEN:}
    real-calls-enabled: ${DREAMMAKER_REAL_CALLS_ENABLED:false}
    request-timeout: ${DREAMMAKER_REQUEST_TIMEOUT:30s}
    max-poll-attempts: ${DREAMMAKER_MAX_POLL_ATTEMPTS:60}
    poll-interval: ${DREAMMAKER_POLL_INTERVAL:2s}
    suno-model: ${SUNO_MODEL:chirp-crow}
    minimax-model: ${MINIMAX_MODEL:minimax-music-2.6}
  temporal:
    target: ${TEMPORAL_TARGET:localhost:7233}
    namespace: ${TEMPORAL_NAMESPACE:default}
    task-queue: ${TEMPORAL_TASK_QUEUE:song-production-local}
