spring:
  application:
    name: music-api
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:yanyun_music}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  flyway:
    enabled: true
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

server:
  port: ${MUSIC_API_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

yanyun:
  music:
    provider: ${MUSIC_PROVIDER:mock}
  dreammaker:
    base-url: ${DREAMMAKER_API_BASE_URL:https://api-all.dreammaker.netease.com}
    api-key: ${DREAMMAKER_API_KEY:}
    access-key: ${DREAMMAKER_ACCESS_KEY:}
    secret-key: ${DREAMMAKER_SECRET_KEY:}
    request-timeout: ${DREAMMAKER_REQUEST_TIMEOUT:30s}
    max-poll-attempts: ${DREAMMAKER_MAX_POLL_ATTEMPTS:60}
    poll-interval: ${DREAMMAKER_POLL_INTERVAL:2s}
    suno-model: ${SUNO_MODEL:chirp-crow}
    minimax-model: ${MINIMAX_MODEL:minimax-music-2.6}
  workflow:
    dispatch-mode: ${MUSIC_WORKFLOW_DISPATCH_MODE:sync}
    outbox:
      dispatcher-enabled: ${WORKFLOW_OUTBOX_DISPATCHER_ENABLED:false}
      poll-interval: ${WORKFLOW_OUTBOX_POLL_INTERVAL:5s}
      batch-size: ${WORKFLOW_OUTBOX_BATCH_SIZE:5}
      max-attempts: ${WORKFLOW_OUTBOX_MAX_ATTEMPTS:3}
      lock-timeout: ${WORKFLOW_OUTBOX_LOCK_TIMEOUT:60s}
      retry-delay: ${WORKFLOW_OUTBOX_RETRY_DELAY:10s}
